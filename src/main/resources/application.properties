spring.application.name=OurMemoriesEduSmart
server.port=${PORT:8080}

# ==================== DATABASE (Production Ready) ====================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/memories?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# ==================== JWT ====================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== GOOGLE OAUTH2 ====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ==================== EMAIL (Gmail) ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.from=ourmemoriesapplicationoffice@gmail.com

# ==================== APP URLS ====================
app.base-url=${APP_BASE_URL:http://localhost:8080}
frontend.url=${FRONTEND_URL:http://our-memories-application-office.vercel.app}

# ==================== STRIPE ====================
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# ==================== PAYMENT UPLOAD ====================
payment.proof.upload.path=${PAYMENT_PROOF_UPLOAD_PATH:${user.home}/uploads/payment-proofs}
payment.max-file-size=${PAYMENT_MAX_FILE_SIZE:5MB}

# ==================== LOGGING ====================
logging.level.com.ourmemories.OurMemoriesEduSmart=INFO
logging.level.com.stripe=INFO