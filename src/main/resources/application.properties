spring.application.name=OurMemoriesEduSmart
server.port=${PORT:8080}

# ==================== DATABASE (Production - Railway) ====================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==================== JWT ====================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== GOOGLE OAUTH2 ====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${FRONTEND_URL}/login/oauth2/code/google

# ==================== EMAIL (Gmail) ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ==================== APP URLS ====================
#app.base-url=${APP_BASE_URL:https://ourmemoriesapplicationoffice-server.onrender.com}
#frontend.url=${FRONTEND_URL:https://our-memories-application-office.vercel.app}

# ==================== STRIPE ====================
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# ==================== PAYMENT UPLOAD ====================
payment.proof.upload.path=${PAYMENT_PROOF_UPLOAD_PATH:/opt/render/project/src/uploads/payment-proofs}
payment.max-file-size=${PAYMENT_MAX_FILE_SIZE:5MB}

# ==================== LOGGING ====================
logging.level.com.ourmemories.OurMemoriesEduSmart=INFO
logging.level.com.stripe=INFO